services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yts
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: yts_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yts -d yts_bot"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bot:
    build: .
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://yts:${POSTGRES_PASSWORD:-changeme}@postgres:5432/yts_bot
      GROQ_API_KEY: ${GROQ_API_KEY}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_USER_ID: ${DISCORD_USER_ID}
      DOWNLOAD_PATH: /downloads
      OPENSUBTITLES_USERNAME: ${OPENSUBTITLES_USERNAME:-}
      OPENSUBTITLES_PASSWORD: ${OPENSUBTITLES_PASSWORD:-}
      WORKER_POLL_INTERVAL: ${WORKER_POLL_INTERVAL:-5}
      YTS_BASE_URL: ${YTS_BASE_URL:-https://yts.mx/api/v2}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
    volumes:
      - downloads:/downloads
    restart: unless-stopped

volumes:
  postgres_data:
  downloads:
